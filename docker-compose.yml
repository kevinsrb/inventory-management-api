services:
  postgres:
    image: postgres:17-alpine
    container_name: mercado-express-postgres
    environment:
      POSTGRES_DB: mercado_express
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mercado_express']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: mercado-express-adminer
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8080:8080'

volumes:
  postgres_data:
